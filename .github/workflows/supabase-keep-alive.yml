name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase keep-alive endpoint
        run: |
          set -euo pipefail

          response=$(curl --fail --silent --show-error --location \
            -H "Authorization: Bearer ${SUPABASE_KEEP_ALIVE_TOKEN}" \
            -H "Origin: https://www.weareteamlovers.com" \
            "https://nchjhivxvnlzswdqvcqp.supabase.co/functions/v1/api/keep-alive")

          echo "$response"
        env:
          SUPABASE_KEEP_ALIVE_TOKEN: ${{ secrets.SUPABASE_KEEP_ALIVE_TOKEN }}
